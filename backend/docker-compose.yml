services:
  mongo:
    image: mongo:7
    container_name: earnedstar-mongo
    profiles: ['db']
    ports:
      - '27018:27017'
    volumes:
      - earnedstar_mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

volumes:
  earnedstar_mongo_data:
